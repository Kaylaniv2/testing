<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Control de Gastos</title>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f7fa;
      padding: 20px;
    }

    form, table, canvas, .card {
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
    }

    #grafico {
      max-width: 500px;
      max-height: 400px;
      display: block;
      margin: 20px auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 8px 10px;
    }

    th {
      background: #eee;
    }

    button, input, select {
      padding: 6px;
      margin-right: 6px;
    }

    button {
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<h1>Control de Gastos</h1>

<form id="form-gastos">
  <input type="date" id="fecha" required>

  <select id="categoria" required>
    <option value="">Seleccionar categoría</option>
    <option value="Alquiler">Alquiler</option>
    <option value="Servicios">Servicios</option>
    <option value="Comida">Comida</option>
    <option value="Transporte">Transporte</option>
    <option value="Salud">Salud</option>
    <option value="Educación">Educación</option>
    <option value="Otros">Otros</option>
  </select>

  <input type="number" id="monto" placeholder="Monto" required>
  <button type="submit">Guardar</button>
</form>

<div class="card">
  <h2>Resumen</h2>
  <p><strong>Total general:</strong> $<span id="total-general">0</span></p>

  <h3>Totales mensuales</h3>
  <label>Mes:</label>
  <select id="mes-select">
    <option value="">Todos</option>
  </select>

  <p><strong>Total del mes:</strong> $<span id="total-mes">0</span></p>
</div>

<div class="card">
  <h3>Filtrar por fechas</h3>
  <input type="date" id="desde">
  <input type="date" id="hasta">
  <button id="btn-filtrar">Filtrar</button>
  <button id="btn-limpiar">Limpiar</button>
</div>

<h2>Listado de gastos</h2>

<table border="1">
  <thead>
    <tr>
      <th>Fecha</th>
      <th>Categoría</th>
      <th>Monto</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody id="tabla-gastos"></tbody>
</table>

<h2>Gráficos</h2>

<select id="tipo-grafico">
  <option value="categoria">Por categoría</option>
  <option value="mes">Comparativa mensual</option>
</select>

<canvas id="grafico"></canvas>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</body>
